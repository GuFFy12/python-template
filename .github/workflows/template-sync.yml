on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  repo-sync:
    if: github.repository != 'GuFFy12/python-template'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: actions-template-sync
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: GuFFy12/python-template
