[project]
name = "python-template"
version = "0.1.0"
description = "Python Template"
readme = "README.md"
requires-python = ">=3.13"
dependencies = []

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pyright>=1.1.408",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.2",
]


[tool.ruff]
target-version = "py313"
line-length = 160

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "ANN"]

[tool.ruff.lint.pycodestyle]
max-line-length = 160

[tool.ruff.lint.per-file-ignores]
".github/*" = ["ALL"]
"tests/*" = ["S101"]


[tool.pytest.ini_options]
pythonpath = ["src"]


[tool.pyright]
typeCheckingMode = "standard"
